services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: whatsapp-webhook:latest
    restart: always
    env_file:
      - ../.env
    environment:
      DB_PATH: /data/app.db
    volumes:
      - app-data:/data
    expose:
      - "5000"

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  app-data:
  caddy-data:
  caddy-config:
